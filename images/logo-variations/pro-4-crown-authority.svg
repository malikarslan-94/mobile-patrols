<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" width="320" height="70">
  <defs>
    <linearGradient id="p4gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8912a"/>
      <stop offset="40%" stop-color="#e8c94a"/>
      <stop offset="100%" stop-color="#b8912a"/>
    </linearGradient>
    <linearGradient id="p4deep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1a30"/>
      <stop offset="100%" stop-color="#0f2844"/>
    </linearGradient>
  </defs>
  <!--
    Concept: Premium authority mark. A micro crown sits above the
    letters, with the shield subtly implied by the text container.
    The crown represents elite-tier service. Luxury security brand.
  -->
  <g transform="translate(5,2)">
    <!-- Shield container -->
    <path d="M28 8 L54 16 L54 40 C54 52 42 60 28 66 C14 60 2 52 2 40 L2 16 Z"
          fill="url(#p4deep)"/>

    <!-- Crown at top of shield -->
    <path d="M14 18 L18 10 L22 16 L28 8 L34 16 L38 10 L42 18 Z"
          fill="url(#p4gold)"/>
    <!-- Crown base band -->
    <rect x="14" y="18" width="28" height="3" rx="0.5" fill="url(#p4gold)"/>
    <!-- Crown jewel dots -->
    <circle cx="22" cy="14" r="1.2" fill="#0a1a30"/>
    <circle cx="28" cy="11" r="1.2" fill="#0a1a30"/>
    <circle cx="34" cy="14" r="1.2" fill="#0a1a30"/>

    <!-- ZSY inside shield -->
    <text x="12" y="44" font-family="'Georgia','Times New Roman',serif" font-weight="700"
          fill="#ffffff" font-size="20" letter-spacing="2" text-anchor="start">ZSY</text>

    <!-- Thin gold underline inside shield -->
    <line x1="12" y1="48" x2="44" y2="48" stroke="url(#p4gold)" stroke-width="0.7"/>

    <!-- Small text inside shield -->
    <text x="28" y="57" font-family="'Arial',sans-serif" font-weight="300"
          fill="url(#p4gold)" font-size="6" letter-spacing="3" text-anchor="middle">SERVICES</text>
  </g>

  <!-- External brand text -->
  <text x="72" y="32" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0a1a30" font-size="32" letter-spacing="3">ZSY</text>

  <!-- Refined gold separator -->
  <line x1="72" y1="40" x2="82" y2="40" stroke="url(#p4gold)" stroke-width="1.5"/>
  <line x1="86" y1="40" x2="160" y2="40" stroke="#ddd" stroke-width="0.5"/>

  <!-- SERVICES -->
  <text x="72" y="54" font-family="'Arial','Helvetica',sans-serif" font-weight="400"
        fill="#0a1a30" font-size="10.5" letter-spacing="7">SERVICES</text>
</svg>