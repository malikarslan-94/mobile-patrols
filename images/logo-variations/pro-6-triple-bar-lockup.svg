<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 70" width="330" height="70">
  <defs>
    <linearGradient id="p6gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ad3a"/>
      <stop offset="100%" stop-color="#b8912a"/>
    </linearGradient>
  </defs>
  <!--
    Concept: Three vertical bars (representing Z, S, Y) of decreasing
    height create a visual rhythm. Each bar is topped with a gold cap.
    Minimal, architectural, like pillars of protection. The negative
    space between them suggests doors/entry points being guarded.
  -->
  <g transform="translate(6,6)">
    <!-- Three pillars -->
    <rect x="0" y="10" width="12" height="48" rx="1" fill="#0b1d36"/>
    <rect x="18" y="4" width="12" height="54" rx="1" fill="#0b1d36"/>
    <rect x="36" y="16" width="12" height="42" rx="1" fill="#0b1d36"/>

    <!-- Gold caps -->
    <rect x="-1" y="8" width="14" height="4" rx="1" fill="url(#p6gold)"/>
    <rect x="17" y="2" width="14" height="4" rx="1" fill="url(#p6gold)"/>
    <rect x="35" y="14" width="14" height="4" rx="1" fill="url(#p6gold)"/>

    <!-- Gold base line connecting all three -->
    <rect x="0" y="56" width="48" height="2" rx="1" fill="url(#p6gold)"/>
  </g>

  <!-- Vertical gold separator -->
  <rect x="66" y="14" width="1.5" height="44" rx="0.75" fill="url(#p6gold)" opacity="0.5"/>

  <!-- ZSY - each letter spaced to echo the three pillars -->
  <text x="80" y="38" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0b1d36" font-size="34" letter-spacing="10">ZSY</text>

  <!-- SERVICES - underneath, widely tracked -->
  <text x="80" y="54" font-family="'Arial','Helvetica',sans-serif" font-weight="300"
        fill="#b8912a" font-size="9" letter-spacing="7.5">SERVICES</text>
</svg>