<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 70" width="330" height="70">
  <defs>
    <linearGradient id="p7navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c1f38"/>
      <stop offset="100%" stop-color="#162f54"/>
    </linearGradient>
    <linearGradient id="p7gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbb842"/>
      <stop offset="100%" stop-color="#b8912a"/>
    </linearGradient>
  </defs>
  <!--
    Concept: A padlock and shield merge into one shape. The lock's
    shackle becomes the shield's top arch. The lock body IS the shield.
    A clean, clever dual-read mark. Inside, a subtle keyhole.
  -->
  <g transform="translate(5,1)">
    <!-- Lock shackle = shield top -->
    <path d="M18 20 L18 12 C18 4 24 0 30 0 C36 0 42 4 42 12 L42 20"
          fill="none" stroke="url(#p7navy)" stroke-width="4" stroke-linecap="round"/>

    <!-- Lock body = shield body -->
    <path d="M8 20 L52 20 L52 42 C52 52 42 60 30 66 C18 60 8 52 8 42 Z"
          fill="url(#p7navy)"/>

    <!-- Keyhole -->
    <circle cx="30" cy="34" r="5" fill="url(#p7gold)"/>
    <path d="M27 37 L27 50 L33 50 L33 37" fill="url(#p7gold)"/>
    <!-- Keyhole inner dark -->
    <circle cx="30" cy="34" r="2.5" fill="#0c1f38"/>
    <rect x="28.5" y="36" width="3" height="8" fill="#0c1f38"/>
  </g>

  <!-- Brand -->
  <text x="68" y="36" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0c1f38" font-size="32" letter-spacing="4">ZSY</text>

  <!-- Double line separator -->
  <line x1="68" y1="43" x2="158" y2="43" stroke="#0c1f38" stroke-width="0.5" opacity="0.2"/>
  <line x1="68" y1="46" x2="158" y2="46" stroke="url(#p7gold)" stroke-width="0.8"/>

  <!-- SERVICES -->
  <text x="68" y="58" font-family="'Arial','Helvetica',sans-serif" font-weight="400"
        fill="#0c1f38" font-size="10" letter-spacing="7">SERVICES</text>
</svg>