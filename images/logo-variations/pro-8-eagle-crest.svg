<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 72" width="330" height="72">
  <defs>
    <linearGradient id="p8navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1928"/>
      <stop offset="100%" stop-color="#14304e"/>
    </linearGradient>
    <linearGradient id="p8gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a030"/>
      <stop offset="50%" stop-color="#e8d060"/>
      <stop offset="100%" stop-color="#b89028"/>
    </linearGradient>
  </defs>
  <!--
    Concept: Abstract eagle wings spread behind a central shield.
    The eagle = vigilance, authority, aerial view. Wings are reduced
    to geometric sweeping curves. Premium heraldic feel without
    being old-fashioned.
  -->
  <g transform="translate(4,2)">
    <!-- Left wing - three sweeping feather strokes -->
    <path d="M28 30 C20 24 6 20 2 12" fill="none" stroke="url(#p8navy)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M28 34 C18 30 8 28 2 22" fill="none" stroke="url(#p8navy)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M28 38 C20 36 10 36 4 32" fill="none" stroke="url(#p8navy)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

    <!-- Right wing -->
    <path d="M36 30 C44 24 58 20 62 12" fill="none" stroke="url(#p8navy)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M36 34 C46 30 56 28 62 22" fill="none" stroke="url(#p8navy)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M36 38 C44 36 54 36 60 32" fill="none" stroke="url(#p8navy)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

    <!-- Central shield -->
    <path d="M32 12 L46 18 L46 38 C46 48 40 54 32 58 C24 54 18 48 18 38 L18 18 Z"
          fill="url(#p8navy)"/>
    <!-- Inner shield border -->
    <path d="M32 16 L42 20 L42 37 C42 44 38 50 32 53 C26 50 22 44 22 37 L22 20 Z"
          fill="none" stroke="url(#p8gold)" stroke-width="0.8"/>

    <!-- Gold star at center -->
    <polygon points="32,24 34,30 40,30 35,34 37,40 32,36 27,40 29,34 24,30 30,30"
             fill="url(#p8gold)" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="78" y="36" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0a1928" font-size="30" letter-spacing="5">ZSY</text>

  <!-- Ornamental gold flourish -->
  <path d="M78 44 Q90 48 102 44 Q114 40 126 44 Q138 48 150 44"
        fill="none" stroke="url(#p8gold)" stroke-width="0.8"/>

  <!-- SERVICES -->
  <text x="78" y="60" font-family="'Arial','Helvetica',sans-serif" font-weight="300"
        fill="#0a1928" font-size="10" letter-spacing="7">SERVICES</text>
</svg>