<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" width="320" height="70">
  <defs>
    <linearGradient id="p3grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1d36"/>
      <stop offset="100%" stop-color="#183d6e"/>
    </linearGradient>
    <linearGradient id="p3gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c49b24"/>
      <stop offset="100%" stop-color="#e8c94a"/>
    </linearGradient>
  </defs>
  <!--
    Concept: Abstract guardian figure — a standing human silhouette
    merged with a shield. The figure's shoulders form the shield top,
    the body tapers to the shield point. Represents protection.
  -->
  <g transform="translate(6,2)">
    <!-- Guardian body = shield shape -->
    <path d="M28 6 C28 6 48 6 50 6 L54 14 L54 36 C54 48 42 58 28 64 C14 58 2 48 2 36 L2 14 L6 6 C8 6 28 6 28 6 Z"
          fill="url(#p3grad)"/>
    <!-- Head circle -->
    <circle cx="28" cy="5" r="5" fill="url(#p3grad)"/>
    <!-- Inner figure suggestion - arms out = protection gesture -->
    <path d="M14 24 L28 20 L42 24" fill="none" stroke="url(#p3gold)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Vertical center line = spine/strength -->
    <line x1="28" y1="20" x2="28" y2="50" stroke="url(#p3gold)" stroke-width="1.2" opacity="0.6"/>
    <!-- Checkmark at heart position -->
    <path d="M23 32 L27 36 L35 28" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- ZSY - serif, authoritative -->
  <text x="70" y="30" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0b1d36" font-size="30" letter-spacing="4">ZSY</text>

  <!-- Gold diamond separator -->
  <rect x="70" y="38" width="4" height="4" rx="0.5" fill="#c49b24" transform="rotate(45,72,40)"/>
  <rect x="82" y="38" width="4" height="4" rx="0.5" fill="#c49b24" transform="rotate(45,84,40)" opacity="0.5"/>

  <!-- SERVICES -->
  <text x="94" y="43" font-family="'Arial','Helvetica',sans-serif" font-weight="300"
        fill="#888" font-size="10" letter-spacing="5">SERVICES</text>
</svg>