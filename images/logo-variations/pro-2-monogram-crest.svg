<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 70" width="330" height="70">
  <defs>
    <linearGradient id="p2gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ad3a"/>
      <stop offset="50%" stop-color="#f0d06e"/>
      <stop offset="100%" stop-color="#c49b24"/>
    </linearGradient>
    <linearGradient id="p2navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1d36"/>
      <stop offset="100%" stop-color="#122d50"/>
    </linearGradient>
  </defs>
  <!--
    Concept: Elegant monogram crest. ZSY initials are abstracted into
    a single unified mark inside a refined shield shape. The S forms
    the central spine, Z and Y branch from it symmetrically.
  -->
  <g transform="translate(4,2)">
    <!-- Outer shield - refined with pointed base -->
    <path d="M30 3 L57 12 L57 38 C57 50 44 58 30 65 C16 58 3 50 3 38 L3 12 Z"
          fill="url(#p2navy)" stroke="none"/>
    <!-- Inner border - thin gold inset -->
    <path d="M30 7 L53 15 L53 37 C53 47 42 54 30 60 C18 54 7 47 7 37 L7 15 Z"
          fill="none" stroke="url(#p2gold)" stroke-width="0.8" opacity="0.7"/>

    <!-- Abstract monogram inside -->
    <!-- S - central flowing spine -->
    <path d="M22 20 C22 20 38 18 38 26 C38 34 22 32 22 40 C22 48 38 46 38 46"
          fill="none" stroke="url(#p2gold)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Z - top left angular stroke -->
    <path d="M16 18 L36 18 L16 30"
          fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- Y - bottom right fork -->
    <path d="M30 40 L40 48 M30 40 L24 48"
          fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Company name -->
  <text x="72" y="34" font-family="'Georgia','Times New Roman',serif" font-weight="700"
        fill="#0b1d36" font-size="28" letter-spacing="5">ZSY</text>

  <!-- Thin separator -->
  <line x1="72" y1="40" x2="155" y2="40" stroke="#c49b24" stroke-width="0.7"/>

  <!-- SERVICES -->
  <text x="72" y="53" font-family="'Arial','Helvetica',sans-serif" font-weight="300"
        fill="#0b1d36" font-size="10" letter-spacing="8">SERVICES</text>
</svg>