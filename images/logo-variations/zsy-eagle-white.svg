<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70">
  <defs>
    <style>
      .brand { font-family: 'Arial Black','Arial','Helvetica',sans-serif; font-weight: 900; letter-spacing: 8px; }
      .sub { font-family: 'Arial','Helvetica',sans-serif; font-weight: 400; letter-spacing: 6px; }
      .estd { font-family: 'Arial','Helvetica',sans-serif; font-weight: 400; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Abstract Eagle / Bird Mark -->
  <g transform="translate(2, 2)">
    <!-- Left wing feathers - parallel diagonal strokes upper-left -->
    <line x1="32" y1="36" x2="10" y2="8" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="18" y2="14" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="40" y1="36" x2="26" y2="18" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

    <!-- Right wing stroke - single bold diagonal upper-right -->
    <line x1="34" y1="34" x2="56" y2="6" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Shadow/depth element on right wing -->
    <line x1="38" y1="36" x2="54" y2="14" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.45"/>

    <!-- Tail / lower crossing strokes -->
    <line x1="22" y1="28" x2="52" y2="58" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <line x1="26" y1="24" x2="48" y2="52" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

    <!-- Central body intersection accent -->
    <line x1="30" y1="40" x2="44" y2="54" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- ESTD '24 - vertical text on left -->
  <text x="66" y="62" class="estd" fill="#ffffff" font-size="6" opacity="0.7"
        transform="rotate(-90, 66, 62)">ESTD '24</text>

  <!-- ZSY -->
  <text x="80" y="38" class="brand" fill="#ffffff" font-size="32">ZSY</text>

  <!-- SERVICES -->
  <text x="80" y="56" class="sub" fill="#ffffff" font-size="11">SERVICES</text>
</svg>